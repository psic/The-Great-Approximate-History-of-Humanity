# VirtualHost pour le projet greatHistory (frise chronologique)
# À copier dans /etc/apache2/sites-available/ puis : sudo a2ensite greatHistory && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName greathistory.local
    DocumentRoot /home/jpierson@sarastro.xyz/Dev/perso/greatHistory

    <Directory /home/jpierson@sarastro.xyz/Dev/perso/greatHistory>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # Permettre l'exécution de PHP dans api/
    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/greatHistory_error.log
    CustomLog ${APACHE_LOG_DIR}/greatHistory_access.log combined
</VirtualHost>
