# Servir depuis /var/www (évite 403 et "Symbolic link not allowed")
# 1. Copier le projet : depuis greatHistory, lancer   bash apache/deploy-vers-varwww.sh
# 2. Activer le site : sudo cp apache/greatHistory-varwww.conf /etc/apache2/sites-available/greatHistory.conf
#    puis sudo a2ensite greatHistory && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName greathistory.local
    DocumentRoot /var/www/greatHistory

    <Directory /var/www/greatHistory>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/greatHistory_error.log
    CustomLog ${APACHE_LOG_DIR}/greatHistory_access.log combined
</VirtualHost>
